name: Release extension

# Build the VSIX and publish a GitHub Release whenever a v* tag is pushed.
# The release carries TWO assets: the versioned VSIX and a stable-named
# `agentville-launcher.vsix`, which the in-extension self-updater downloads from
# releases/latest/download/agentville-launcher.vsix (see src/updater.js).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Root deps provide pixi.js, which the webview renderer bundle imports.
      - name: Install root deps
        run: npm install

      - name: Install extension deps
        working-directory: vscode-extension
        run: npm install

      - name: Build webview + monitor bundles
        working-directory: vscode-extension
        run: npm run build

      - name: Package VSIX
        working-directory: vscode-extension
        run: |
          npx --yes @vscode/vsce@latest package --allow-missing-repository --no-dependencies
          cp agentville-launcher-*.vsix agentville-launcher.vsix

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Agentville Launcher ${{ github.ref_name }}
          files: |
            vscode-extension/agentville-launcher-*.vsix
            vscode-extension/agentville-launcher.vsix
