name: Release extension

# Build the VSIX and publish a GitHub Release whenever a v* tag is pushed.
# The release carries TWO assets: the versioned VSIX and a stable-named
# `agentville-launcher.vsix`, which the in-extension self-updater downloads from
# releases/latest/download/agentville-launcher.vsix (see src/updater.js).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 0.1.10 (tag v<version> is created)'
        required: true
        default: '0.1.10'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # electron is a root devDependency unrelated to the build; its postinstall downloads
    # a large binary that flakes the runner ("socket hang up"). Skip that download — only
    # pixi.js + esbuild are needed to build the extension.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Root deps provide pixi.js, which the webview renderer bundle imports.
      - name: Install root deps
        run: npm install

      - name: Install extension deps
        working-directory: vscode-extension
        run: npm install

      - name: Build webview + monitor bundles
        working-directory: vscode-extension
        run: npm run build

      - name: Package VSIX
        working-directory: vscode-extension
        run: |
          npx --yes @vscode/vsce@latest package --allow-missing-repository --no-dependencies
          cp agentville-launcher-*.vsix agentville-launcher.vsix

      # Tag from the pushed ref (push event) or from the dispatch input. On a
      # workflow_dispatch run the release action creates the tag at this commit.
      - name: Compute tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Agentville Launcher ${{ steps.tag.outputs.tag }}
          files: |
            vscode-extension/agentville-launcher-*.vsix
            vscode-extension/agentville-launcher.vsix
