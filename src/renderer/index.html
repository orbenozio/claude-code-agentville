<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentville 🏘️</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #7ec850;
        font-family: "Comic Sans MS", "Trebuchet MS", Verdana, sans-serif;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 12px;
        color: #1b3a1b;
        font-size: 12px;
        font-weight: 700;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        pointer-events: none;
        z-index: 10;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      #gear {
        position: fixed;
        top: 8px;
        right: 10px;
        z-index: 20;
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        font-size: 18px;
        cursor: pointer;
      }
      #gear:hover {
        background: #fff;
      }
      #panel {
        position: fixed;
        top: 50px;
        right: 10px;
        z-index: 20;
        width: 200px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 12px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        color: #223018;
        font-size: 13px;
        display: none;
      }
      #panel.open {
        display: block;
      }
      #panel h3 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      #panel label {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 3px 0;
        cursor: pointer;
      }
      #panel .row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #panel input[type="range"] {
        flex: 1;
      }
      #panel .hint {
        margin-top: 8px;
        font-size: 11px;
        color: #6a7a5a;
      }
    </style>
  </head>
  <body>
    <div id="hud">Agentville 🏘️ — connecting…</div>
    <button id="gear" title="Settings">⚙️</button>
    <div id="panel">
      <h3>🐾 Village critters</h3>
      <label><input type="checkbox" data-animal="bird" checked /> 🐦 Birds</label>
      <label><input type="checkbox" data-animal="sheep" checked /> 🐑 Sheep</label>
      <label><input type="checkbox" data-animal="cow" checked /> 🐄 Cows</label>
      <label><input type="checkbox" data-animal="horse" checked /> 🐎 Horses</label>
      <label><input type="checkbox" data-animal="chicken" checked /> 🐔 Chickens</label>
      <div class="row">
        <span>Max</span>
        <input id="maxAnimals" type="range" min="0" max="14" value="8" />
        <span id="maxVal">8</span>
      </div>
      <label class="row"><input type="checkbox" data-toggle="fish" checked /> 🐟 River fish</label>
      <label class="row"><input type="checkbox" data-toggle="clouds" checked /> ☁️ Clouds</label>
      <div class="hint">Too busy? Trim the herd here.</div>
    </div>
    <div id="app"></div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
