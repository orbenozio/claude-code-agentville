<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentville 🏘️</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #7ec850;
        font-family: "Comic Sans MS", "Trebuchet MS", Verdana, sans-serif;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 12px;
        max-width: calc(100vw - 60px);
        color: #14290f;
        font-size: 12px;
        font-weight: 700;
        /* light pill behind the text so the dark-green label keeps AA contrast over grass
           (and stays legible under the night ambient tint) */
        background: rgba(255, 255, 255, 0.72);
        padding: 3px 9px;
        border-radius: 9px;
        pointer-events: none;
        z-index: 10;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      #gear {
        position: fixed;
        top: 8px;
        right: 10px;
        z-index: 20;
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        font-size: 18px;
        cursor: pointer;
      }
      #gear:hover {
        background: #fff;
      }
      #panel {
        position: fixed;
        top: 50px;
        right: 10px;
        z-index: 20;
        width: 200px;
        max-width: calc(100vw - 20px);
        max-height: calc(100vh - 60px);
        overflow-y: auto;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 12px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        color: #223018;
        font-size: 13px;
        display: none;
      }
      #panel.open {
        display: block;
      }
      #panel h3 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      #panel label {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 3px 0;
        cursor: pointer;
      }
      #panel .row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #panel input[type="range"] {
        flex: 1;
      }
      #panel input[type="text"],
      #panel input[type="number"],
      #panel select {
        flex: 1;
        min-width: 0;
        padding: 4px 6px;
        border: 1px solid #c4ccba;
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
        background: #fff;
      }
      #panel button.mini {
        padding: 4px 9px;
        border: none;
        border-radius: 6px;
        background: #8fb96b;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      #panel button.mini:hover {
        background: #7da75c;
      }
      #panel .hint {
        margin-top: 8px;
        font-size: 11px;
        color: #6a7a5a;
      }
      /* visible only to assistive tech / keyboard focus — the canvas itself is decorative */
      .sr-only {
        position: fixed;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        border: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }
      .sr-only:focus {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: auto;
        height: auto;
        margin: 0;
        padding: 6px 12px;
        clip: auto;
        z-index: 30;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        color: #223018;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="hud">Agentville 🏘️ - connecting…</div>
    <button id="gear" title="Settings">⚙️</button>
    <div id="panel">
      <h3>🏘️ Town &amp; villages</h3>
      <div class="row">
        <input id="townName" type="text" placeholder="Town name" maxlength="22" />
        <button id="townGo" class="mini">Set</button>
      </div>
      <div class="row">
        <input id="villageName" type="text" placeholder="This chat's name" maxlength="40" />
        <button id="villageGo" class="mini">Set</button>
      </div>
      <div class="row">
        <span>Villages to cycle</span>
        <input id="maxVillages" type="number" min="2" max="30" value="6" style="width: 54px; flex: 0 0 auto" />
      </div>
      <h3 style="margin-top: 12px">🐾 Critters &amp; nature</h3>
      <label><input type="checkbox" data-animal="bird" checked /> 🐦 Birds</label>
      <label><input type="checkbox" data-animal="sheep" checked /> 🐑 Sheep</label>
      <label><input type="checkbox" data-animal="cow" checked /> 🐄 Cows</label>
      <label><input type="checkbox" data-animal="horse" checked /> 🐎 Horses</label>
      <label><input type="checkbox" data-animal="chicken" checked /> 🐔 Chickens</label>
      <div class="row">
        <span>Max</span>
        <input id="maxAnimals" type="range" min="0" max="14" value="8" />
        <span id="maxVal">8</span>
      </div>
      <label class="row"><input type="checkbox" data-toggle="fish" checked /> 🐟 River fish</label>
      <label class="row"><input type="checkbox" data-toggle="clouds" checked /> ☁️ Clouds</label>
      <h3 style="margin-top: 12px">🌦️ Weather &amp; time</h3>
      <div class="row">
        <select id="timeMode">
          <option value="auto">🕐 Time: Auto (now)</option>
          <option value="dawn">🌅 Dawn</option>
          <option value="day">☀️ Day</option>
          <option value="dusk">🌇 Dusk</option>
          <option value="night">🌙 Night</option>
        </select>
      </div>
      <div class="row">
        <select id="wxMode">
          <option value="auto">Auto (by city)</option>
          <option value="clear">☀️ Clear</option>
          <option value="clouds">☁️ Cloudy</option>
          <option value="rain">🌧️ Rain</option>
          <option value="snow">❄️ Snow</option>
          <option value="fog">🌫️ Fog</option>
          <option value="thunder">⛈️ Storm</option>
        </select>
      </div>
      <div class="row">
        <input id="city" type="text" placeholder="Your city" />
        <button id="cityGo" class="mini">Set</button>
      </div>
      <div id="weatherLabel" class="hint">Weather: off (pick a mode or enter a city)</div>
    </div>
    <div id="app" role="img" aria-label="Agentville: connecting"></div>
    <!-- Accessible, keyboard-reachable mirror of the on-canvas signposts + a live status
         region. The canvas is decorative (role=img); these give screen-reader/keyboard
         users the same navigation and a spoken summary of what the village is doing. -->
    <button id="navPrev" class="sr-only" type="button">Previous chat village</button>
    <button id="navNext" class="sr-only" type="button">Next chat village</button>
    <div id="a11yStatus" class="sr-only" role="status" aria-live="polite"></div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
